<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Woodcraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <a href="index.html" class="sidebar-brand">
            <i class="fa-solid fa-tree"></i> Woodcraft
        </a>
        <div class="nav flex-column">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-link"><i class="fa-solid fa-box-open"></i> Orders</a>
            <a href="inventory.html" class="nav-link active"><i class="fa-solid fa-warehouse"></i> Inventory</a>
            <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> Employees</a>
            <a href="billing.html" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</a>
            <a href="reports.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="#" class="nav-link" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="d-flex align-items-center">
                <button class="icon-btn d-md-none me-3" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="page-title">Inventory</h2>
            </div>
            <div class="navbar-actions">
                <div class="search-bar d-none d-md-block">
                    <input type="text" placeholder="Search...">
                </div>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-circle-user"></i></button>
            </div>
        </header>

        <!-- Page Content -->
        <main class="content-wrapper">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Materials &amp; Stock</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addMaterialModal">
                    <i class="fa-solid fa-plus me-1"></i> Add Material
                </button>
            </div>

            <!-- Alert message -->
            <div id="inventoryAlert" class="alert d-none" role="alert"></div>

            <!-- Inventory Table -->
            <div class="card">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Material Name</th>
                                <th>Quantity</th>
                                <th>Supplier</th>
                                <th>Stock Status</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <tr><td colspan="4" class="text-center text-muted py-3"><i class="fa-solid fa-spinner fa-spin me-2"></i>Loading inventory...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Add Material Modal -->
    <div class="modal fade" id="addMaterialModal" tabindex="-1" aria-labelledby="addMaterialModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addMaterialModalLabel">Add New Material</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addMaterialForm">
                <div class="mb-3">
                    <label for="materialName" class="form-label">Material Name</label>
                    <input type="text" class="form-control" id="materialName" name="material_name" placeholder="e.g. Oak Wood" required>
                </div>
                <div class="mb-3">
                    <label for="materialQtyInput" class="form-label">Quantity</label>
                    <input type="number" class="form-control" id="materialQtyInput" name="quantity" placeholder="e.g. 100" min="0" required>
                </div>
                <div class="mb-3">
                    <label for="materialUnit" class="form-label">Unit</label>
                    <input type="text" class="form-control" id="materialUnit" name="unit" placeholder="e.g. pcs, kg, boxes">
                </div>
                <div class="mb-3">
                    <label for="materialSupplier" class="form-label">Supplier</label>
                    <input type="text" class="form-control" id="materialSupplier" name="supplier" placeholder="Supplier name">
                </div>
                <div class="mb-3">
                    <label for="lowStockThreshold" class="form-label">Low Stock Threshold</label>
                    <input type="number" class="form-control" id="lowStockThreshold" name="low_stock_threshold" value="20" min="0">
                    <div class="form-text">Alert when quantity falls below this number.</div>
                </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveMaterialBtn">
                <i class="fa-solid fa-floppy-disk me-1"></i> Save Material
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
