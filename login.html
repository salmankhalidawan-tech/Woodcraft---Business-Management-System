<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Woodcraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f5ede0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: #fff; border-radius: 12px; padding: 2.5rem; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(92,58,33,0.12); }
        .auth-brand { font-size: 1.6rem; font-weight: 700; color: #5C3A21; text-align: center; margin-bottom: 1.5rem; }
        .auth-brand i { margin-right: 8px; }
        .btn-primary { background: #5C3A21; border-color: #5C3A21; }
        .btn-primary:hover { background: #4a2e1a; border-color: #4a2e1a; }
        .alert-msg { display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <i class="fa-solid fa-tree"></i> Woodcraft
        </div>
        <h5 class="text-center mb-4 text-muted">Admin Login</h5>

        <div id="alertMsg" class="alert alert-msg" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="loginEmail" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="loginEmail" name="email" placeholder="admin@woodcraft.com" required>
            </div>
            <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Enter password" required>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fa-solid fa-right-to-bracket me-1"></i> Login
                </button>
            </div>
        </form>

        <p class="text-center mt-3 text-muted small">
            First time? <a href="register.html" style="color:#5C3A21;">Create admin account</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        fetch('api/auth.php?action=check')
            .then(r => r.json())
            .then(data => {
                if (data.authenticated) window.location.href = 'index.html';
            });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('alertMsg');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Logging in...';

            const payload = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            fetch('api/auth.php?action=login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert.className = 'alert alert-success alert-msg';
                    alert.style.display = 'block';
                    alert.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => window.location.href = 'index.html', 800);
                } else {
                    alert.className = 'alert alert-danger alert-msg';
                    alert.style.display = 'block';
                    alert.textContent = data.message || 'Login failed.';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-1"></i> Login';
                }
            })
            .catch(() => {
                alert.className = 'alert alert-danger alert-msg';
                alert.style.display = 'block';
                alert.textContent = 'Server error. Make sure XAMPP/WAMP is running.';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-1"></i> Login';
            });
        });
    </script>
</body>
</html>
