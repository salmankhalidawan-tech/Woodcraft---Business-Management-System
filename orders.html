<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Woodcraft</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <a href="index.html" class="sidebar-brand">
            <i class="fa-solid fa-tree"></i> Woodcraft
        </a>
        <div class="nav flex-column">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-link active"><i class="fa-solid fa-box-open"></i> Orders</a>
            <a href="inventory.html" class="nav-link"><i class="fa-solid fa-warehouse"></i> Inventory</a>
            <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> Employees</a>
            <a href="billing.html" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</a>
            <a href="reports.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="#" class="nav-link" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="d-flex align-items-center">
                <button class="icon-btn d-md-none me-3" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="page-title">Orders</h2>
            </div>
            <div class="navbar-actions">
                <div class="search-bar d-none d-md-block">
                    <input type="text" placeholder="Search...">
                </div>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-circle-user"></i></button>
            </div>
        </header>

        <!-- Page Content -->
        <main class="content-wrapper">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Manage Orders</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addOrderModal">
                    <i class="fa-solid fa-plus me-1"></i> Add New Order
                </button>
            </div>

            <!-- Alert message -->
            <div id="ordersAlert" class="alert d-none" role="alert"></div>

            <!-- Orders Table -->
            <div class="card">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer Name</th>
                                <th>Order Type</th>
                                <th>Status</th>
                                <th>Cost</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr><td colspan="6" class="text-center text-muted py-3"><i class="fa-solid fa-spinner fa-spin me-2"></i>Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Add Order Modal -->
    <div class="modal fade" id="addOrderModal" tabindex="-1" aria-labelledby="addOrderModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addOrderModalLabel">Add New Order</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addOrderForm">
                <div class="mb-3">
                    <label for="customerName" class="form-label">Customer Name</label>
                    <input type="text" class="form-control" id="customerName" name="customer_name" placeholder="Enter customer name" required>
                </div>
                <div class="mb-3">
                    <label for="orderType" class="form-label">Order Type</label>
                    <input type="text" class="form-control" id="orderType" name="order_type" placeholder="e.g. Dining Table, Chairs">
                </div>
                <div class="mb-3">
                    <label for="orderCost" class="form-label">Cost ($)</label>
                    <input type="number" class="form-control" id="orderCost" name="cost" placeholder="Enter amount" min="0" step="0.01">
                </div>
                <div class="mb-3">
                    <label for="orderStatus" class="form-label">Status</label>
                    <select class="form-select" id="orderStatus" name="status">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="materialSelect" class="form-label">Deduct Material (Optional)</label>
                    <select class="form-select" id="materialSelect" name="material_id">
                        <option value="">-- Select Material --</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="materialQty" class="form-label">Material Quantity to Deduct</label>
                    <input type="number" class="form-control" id="materialQty" name="material_qty" value="1" min="0">
                </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveOrderBtn">
                <i class="fa-solid fa-floppy-disk me-1"></i> Save Order
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Update Status Modal -->
    <div class="modal fade" id="updateStatusModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Update Status</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="updateOrderId">
            <label class="form-label">New Status</label>
            <select class="form-select" id="updateStatusSelect">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="confirmUpdateStatusBtn">Update</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
