<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Woodcraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <a href="index.html" class="sidebar-brand">
            <i class="fa-solid fa-tree"></i> Woodcraft
        </a>
        <div class="nav flex-column">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-link"><i class="fa-solid fa-box-open"></i> Orders</a>
            <a href="inventory.html" class="nav-link"><i class="fa-solid fa-warehouse"></i> Inventory</a>
            <a href="employees.html" class="nav-link active"><i class="fa-solid fa-users"></i> Employees</a>
            <a href="billing.html" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</a>
            <a href="reports.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="#" class="nav-link" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="d-flex align-items-center">
                <button class="icon-btn d-md-none me-3" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="page-title">Employees</h2>
            </div>
            <div class="navbar-actions">
                <div class="search-bar d-none d-md-block">
                    <input type="text" placeholder="Search...">
                </div>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-circle-user"></i></button>
            </div>
        </header>

        <!-- Page Content -->
        <main class="content-wrapper">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Staff Directory</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
                    <i class="fa-solid fa-user-plus me-1"></i> Add Employee
                </button>
            </div>

            <!-- Alert message -->
            <div id="employeesAlert" class="alert d-none" role="alert"></div>

            <!-- Employee Cards Grid -->
            <div class="row" id="employeeCardsContainer">
                <div class="col-12 text-center text-muted py-4">
                    <i class="fa-solid fa-spinner fa-spin me-2"></i>Loading employees...
                </div>
            </div>

        </main>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal fade" id="addEmployeeModal" tabindex="-1" aria-labelledby="addEmployeeModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addEmployeeModalLabel">Add New Employee</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addEmployeeForm">
                <div class="mb-3">
                    <label for="empName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="empName" name="name" placeholder="Employee full name" required>
                </div>
                <div class="mb-3">
                    <label for="empRole" class="form-label">Role / Position</label>
                    <input type="text" class="form-control" id="empRole" name="role" placeholder="e.g. Master Carpenter" required>
                </div>
                <div class="mb-3">
                    <label for="empWork" class="form-label">Assigned Work</label>
                    <input type="text" class="form-control" id="empWork" name="assigned_work" placeholder="e.g. Custom Dining Table">
                </div>
                <div class="mb-3">
                    <label for="empHours" class="form-label">Working Hours / Week</label>
                    <input type="number" class="form-control" id="empHours" name="working_hours" placeholder="e.g. 40" min="0" step="0.5">
                </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveEmployeeBtn">
                <i class="fa-solid fa-floppy-disk me-1"></i> Save Employee
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
