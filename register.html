<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Woodcraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f5ede0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: #fff; border-radius: 12px; padding: 2.5rem; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(92,58,33,0.12); }
        .auth-brand { font-size: 1.6rem; font-weight: 700; color: #5C3A21; text-align: center; margin-bottom: 1.5rem; }
        .auth-brand i { margin-right: 8px; }
        .btn-primary { background: #5C3A21; border-color: #5C3A21; }
        .btn-primary:hover { background: #4a2e1a; border-color: #4a2e1a; }
        .alert-msg { display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <i class="fa-solid fa-tree"></i> Woodcraft
        </div>
        <h5 class="text-center mb-1 text-muted">Create Admin Account</h5>
        <p class="text-center text-muted small mb-4">One-time setup for the business owner</p>

        <div id="alertMsg" class="alert alert-msg" role="alert"></div>

        <form id="registerForm">
            <div class="mb-3">
                <label for="regName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="regName" name="name" placeholder="Your full name" required>
            </div>
            <div class="mb-3">
                <label for="regEmail" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="regEmail" name="email" placeholder="admin@woodcraft.com" required>
            </div>
            <div class="mb-3">
                <label for="regPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="regPassword" name="password" placeholder="Minimum 6 characters" required>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <i class="fa-solid fa-user-plus me-1"></i> Create Account
                </button>
            </div>
        </form>

        <p class="text-center mt-3 text-muted small">
            Already have an account? <a href="login.html" style="color:#5C3A21;">Login here</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const alert = document.getElementById('alertMsg');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Creating account...';

            const payload = {
                name:     document.getElementById('regName').value,
                email:    document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };

            fetch('api/auth.php?action=register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert.className = 'alert alert-success alert-msg';
                    alert.style.display = 'block';
                    alert.textContent = data.message + ' Redirecting to login...';
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    alert.className = 'alert alert-danger alert-msg';
                    alert.style.display = 'block';
                    alert.textContent = data.message || 'Registration failed.';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-user-plus me-1"></i> Create Account';
                }
            })
            .catch(() => {
                alert.className = 'alert alert-danger alert-msg';
                alert.style.display = 'block';
                alert.textContent = 'Server error. Make sure XAMPP/WAMP is running.';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-user-plus me-1"></i> Create Account';
            });
        });
    </script>
</body>
</html>
