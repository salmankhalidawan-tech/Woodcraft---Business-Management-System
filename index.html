<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Woodcraft</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <a href="index.html" class="sidebar-brand">
            <i class="fa-solid fa-tree"></i> Woodcraft
        </a>
        <div class="nav flex-column">
            <a href="index.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-link"><i class="fa-solid fa-box-open"></i> Orders</a>
            <a href="inventory.html" class="nav-link"><i class="fa-solid fa-warehouse"></i> Inventory</a>
            <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> Employees</a>
            <a href="billing.html" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</a>
            <a href="reports.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="#" class="nav-link" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="d-flex align-items-center">
                <button class="icon-btn d-md-none me-3" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="page-title">Dashboard</h2>
            </div>
            <div class="navbar-actions">
                <div class="search-bar d-none d-md-block">
                    <input type="text" placeholder="Search...">
                </div>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <span class="icon-btn" id="navUserName" style="font-size:0.85rem; font-weight:600;"></span>
            </div>
        </header>

        <!-- Page Content -->
        <main class="content-wrapper">
            
            <!-- Summary Cards -->
            <div class="row mb-4">
                <div class="col-md-3 mb-3">
                    <div class="card p-3 text-center h-100">
                        <h6 class="text-muted">Total Orders</h6>
                        <h3 id="statTotalOrders"><i class="fa-solid fa-spinner fa-spin text-muted"></i></h3>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card p-3 text-center h-100">
                        <h6 class="text-muted">Revenue</h6>
                        <h3 id="statRevenue"><i class="fa-solid fa-spinner fa-spin text-muted"></i></h3>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card p-3 text-center h-100">
                        <h6 class="text-muted">Pending Orders</h6>
                        <h3 id="statPendingOrders"><i class="fa-solid fa-spinner fa-spin text-muted"></i></h3>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card p-3 text-center h-100">
                        <h6 class="text-muted">Low Stock Alerts</h6>
                        <h3 class="text-warning-custom" id="statLowStock"><i class="fa-solid fa-spinner fa-spin text-muted"></i></h3>
                    </div>
                </div>
            </div>

            <div class="row">
                <!-- Chart Section -->
                <div class="col-lg-8 mb-4">
                    <div class="card h-100">
                        <div class="card-header">
                            Revenue Overview
                        </div>
                        <div class="card-body" style="height: 300px;">
                            <canvas id="dashboardChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Low Stock Alert List -->
                <div class="col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-header">
                            Low Stock Alerts
                        </div>
                        <div class="card-body">
                            <ul class="list-group list-group-flush" id="lowStockList">
                                <li class="list-group-item px-0 text-muted"><i class="fa-solid fa-spinner fa-spin me-2"></i>Loading...</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Orders Table -->
            <div class="card">
                <div class="card-header">
                    Recent Orders
                </div>
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer Name</th>
                                <th>Status</th>
                                <th>Cost</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrdersBody">
                            <tr><td colspan="4" class="text-center text-muted py-3"><i class="fa-solid fa-spinner fa-spin me-2"></i>Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
