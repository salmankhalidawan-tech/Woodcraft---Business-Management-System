<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Woodcraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <a href="index.html" class="sidebar-brand">
            <i class="fa-solid fa-tree"></i> Woodcraft
        </a>
        <div class="nav flex-column">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-link"><i class="fa-solid fa-box-open"></i> Orders</a>
            <a href="inventory.html" class="nav-link"><i class="fa-solid fa-warehouse"></i> Inventory</a>
            <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> Employees</a>
            <a href="billing.html" class="nav-link active"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</a>
            <a href="reports.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="#" class="nav-link" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="d-flex align-items-center">
                <button class="icon-btn d-md-none me-3" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="page-title">Billing &amp; Invoices</h2>
            </div>
            <div class="navbar-actions">
                <div class="search-bar d-none d-md-block">
                    <input type="text" placeholder="Search...">
                </div>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-circle-user"></i></button>
            </div>
        </header>

        <!-- Page Content -->
        <main class="content-wrapper">

            <!-- Revenue Summary Cards -->
            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <div class="card p-3 text-center h-100">
                        <h6 class="text-muted">Total Revenue Collected</h6>
                        <h3 id="billStatRevenue"><i class="fa-solid fa-spinner fa-spin text-muted"></i></h3>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card p-3 text-center h-100">
                        <h6 class="text-muted">Total Unpaid Amount</h6>
                        <h3 id="billStatUnpaid"><i class="fa-solid fa-spinner fa-spin text-muted"></i></h3>
                    </div>
                </div>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Invoice History</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addInvoiceModal">
                    <i class="fa-solid fa-file-invoice me-1"></i> Generate Invoice
                </button>
            </div>

            <!-- Alert message -->
            <div id="billingAlert" class="alert d-none" role="alert"></div>

            <!-- Billing Table -->
            <div class="card">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Invoice ID</th>
                                <th>Customer Name</th>
                                <th>Amount</th>
                                <th>Payment Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="billingTableBody">
                            <tr><td colspan="5" class="text-center text-muted py-3"><i class="fa-solid fa-spinner fa-spin me-2"></i>Loading invoices...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Add Invoice Modal -->
    <div class="modal fade" id="addInvoiceModal" tabindex="-1" aria-labelledby="addInvoiceModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addInvoiceModalLabel">Generate Invoice</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addInvoiceForm">
                <div class="mb-3">
                    <label for="invCustomer" class="form-label">Customer Name</label>
                    <input type="text" class="form-control" id="invCustomer" name="customer_name" placeholder="Customer name" required>
                </div>
                <div class="mb-3">
                    <label for="invAmount" class="form-label">Amount ($)</label>
                    <input type="number" class="form-control" id="invAmount" name="amount" placeholder="Enter amount" min="0" step="0.01" required>
                </div>
                <div class="mb-3">
                    <label for="invStatus" class="form-label">Payment Status</label>
                    <select class="form-select" id="invStatus" name="payment_status">
                        <option value="Unpaid">Unpaid</option>
                        <option value="Paid">Paid</option>
                        <option value="Partial">Partial</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="invOrderId" class="form-label">Linked Order ID (Optional)</label>
                    <input type="number" class="form-control" id="invOrderId" name="order_id" placeholder="e.g. 5">
                </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveInvoiceBtn">
                <i class="fa-solid fa-floppy-disk me-1"></i> Save Invoice
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Update Payment Status Modal -->
    <div class="modal fade" id="updatePaymentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Update Payment</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="updateInvoiceId">
            <label class="form-label">Payment Status</label>
            <select class="form-select" id="updatePaymentSelect">
                <option value="Unpaid">Unpaid</option>
                <option value="Paid">Paid</option>
                <option value="Partial">Partial</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="confirmUpdatePaymentBtn">Update</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
